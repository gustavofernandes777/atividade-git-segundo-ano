<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empresa Doce Mágico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class=" empresa">
        <h1>Empresa Doce Mágico</h1>
    </div>

    <div class="opção"   id="login-section">
        <label for="role">Escolha seu acesso:</label>
        <select id="role">
            <option value="0">Selecionar...</option>
            <option value="1">Cadastro de funcionário</option>
            <option value="2">Repositor</option>
            <option value="3">Funcionário</option>
            <option value="4">Contador</option>
            <option value="5">Chefe</option>
        </select>
        <br>
        <label for="password">Senha:</label>
        <input type="password" id="password">
        <br>
        <button onclick="login()">Entrar</button>
        <p id="login-msg"></p>
    </div>

    <div id="menu-section" style="display:none;"></div>

    <script src="script.js"></script>
</body>
</html>
